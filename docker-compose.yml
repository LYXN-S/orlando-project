services:
  orlando-postgres:
    image: postgres:16-alpine
    container_name: orlando-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orlandodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5441:5432"
    volumes:
      - orlando_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orlandodb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  orlando_pgdata:
