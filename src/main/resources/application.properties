spring.application.name=OrlandoProject
spring.application.version=0.0.0-SNAPSHOT

# DataSource
# Railway provides DATABASE_URL but we need to construct JDBC URL from individual components
# Railway also provides: PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST:${DB_HOST:localhost}}:${PGPORT:${DB_PORT:5441}}/${PGDATABASE:${DB_NAME:orlandodb}}
spring.datasource.username=${PGUSER:${DB_USER:postgres}}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicitly set Hibernate dialect to avoid JDBC metadata issues
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=10MB

# Actuator endpoints for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
management.endpoint.health.probes.enabled=true

# Server port (Railway will override with PORT env variable)
server.port=${PORT:8080}

# CORS Configuration
# Comma-separated list of allowed origins for cross-origin requests
# Format: http://domain:port or https://domain:port (no trailing slashes)
# Environment variable: ALLOWED_ORIGINS
# Default: localhost origins for local development
# Production: Set ALLOWED_ORIGINS environment variable with production frontend URLs
# Example: ALLOWED_ORIGINS=https://frontend.example.com,https://app.example.com
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://localhost:3000}

# Spring Modulith Event Publication Registry
spring.modulith.events.republish-outstanding-events-on-restart=true

